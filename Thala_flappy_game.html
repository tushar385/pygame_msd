<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Dhoni</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #ffdf00;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            touch-action: none;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
        }
        .start-screen, .game-over-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            z-index: 10;
            overflow-y: auto;
            padding: 16px;
        }
        .start-screen h1, .game-over-screen h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .start-screen p, .game-over-screen p { font-size: 1.2em; margin: 6px 0; }
        .btn {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            margin: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:hover { background: #45a049; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .hidden { display: none !important; }
        #nameInput {
            padding: 10px 18px;
            font-size: 1.1em;
            border-radius: 20px;
            border: 2px solid #ffdf00;
            outline: none;
            margin: 8px;
            text-align: center;
            width: 220px;
            background: #1a1a1a;
            color: #fff;
        }
        .leaderboard {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,223,0,0.4);
            border-radius: 14px;
            padding: 12px 20px;
            margin: 10px 0;
            width: 280px;
        }
        .leaderboard h2 { font-size: 1.1em; color: #ffdf00; margin-bottom: 8px; letter-spacing: 1px; }
        .lb-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 2px;
            font-size: 0.95em;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .lb-row:last-child { border-bottom: none; }
        .lb-rank { color: #ffdf00; font-weight: bold; width: 28px; }
        .lb-name { flex: 1; text-align: left; padding: 0 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lb-score { font-weight: bold; color: #7fff7f; }
        .lb-empty { color: #888; font-size: 0.9em; padding: 6px 0; }
        @media (max-width: 768px) {
            .start-screen h1, .game-over-screen h1 { font-size: 2em; }
            .btn { padding: 12px 25px; font-size: 1.1em; }
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- START SCREEN -->
<div class="start-screen" id="startScreen">
    <h1>🏏 Flappy Dhoni</h1>
    <img src="start.png" alt="Start" style="width:280px;height:210px;margin:12px;border:2px solid #000;border-radius:10px;">
    <p>Enter your name to play!</p>
    <input type="text" id="nameInput" placeholder="Your name..." maxlength="16" autocomplete="off">
    <button class="btn" id="startBtn">▶ Start Playing!</button>
    <div style="color:#aaa;font-size:0.85em;margin-top:4px;">Tap anywhere to jump</div>
    <div class="leaderboard" id="startLeaderboard">
        <h2>🏆 Top Players</h2>
        <div class="lb-empty">Loading...</div>
    </div>
</div>

<!-- GAME OVER SCREEN -->
<div class="game-over-screen hidden" id="gameOverScreen">
    <img src="image.png" alt="Game Over" style="width:300px;height:200px;margin:8px;border:2px solid #000;border-radius:10px;">
    <h1 style="font-size:1.4em;margin-bottom:4px;">GAME OVER!</h1>
    <p id="finalScore" style="font-size:1.1em;"></p>
    <div style="display:flex;align-items:center;gap:8px;margin:4px 0;" id="nameDisplay">
        <span id="displayName" style="color:#ffdf00;font-size:1em;"></span>
        <button class="btn" id="editNameBtn" style="padding:6px 14px;font-size:0.85em;margin:0;background:#555;">✏️ Edit</button>
    </div>
    <div style="display:none;align-items:center;gap:6px;margin:4px 0;" id="nameEditRow">
        <input type="text" id="editNameInput" maxlength="16" autocomplete="off"
            style="padding:7px 12px;font-size:1em;border-radius:16px;border:2px solid #ffdf00;background:#1a1a1a;color:#fff;width:160px;text-align:center;outline:none;">
        <button class="btn" id="saveNameBtn" style="padding:7px 14px;font-size:0.9em;margin:0;">✔ Save</button>
    </div>
    <button class="btn" id="restartBtn" disabled style="opacity:0.5;cursor:not-allowed;">
        <span id="restartLabel">⏳ Wait...</span>
    </button>
    <div class="leaderboard" id="gameOverLeaderboard">
        <h2>🏆 Top Players</h2>
        <div class="lb-empty">Loading...</div>
    </div>
</div>

<script>
// ── Firebase REST API ─────────────────────────────────────────────────────────
const FB_PROJECT = "flappy-dhoni-game";
const FB_BASE    = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;

async function getLeaderboard() {
    try {
        const url = `${FB_BASE}/leaderboard?pageSize=10&orderBy=score+desc`;
        const res = await fetch(url);
        if (!res.ok) return [];
        const data = await res.json();
        if (!data.documents) return [];
        return data.documents.map(d => ({
            name:  d.fields.name.stringValue,
            score: parseInt(d.fields.score.integerValue || d.fields.score.doubleValue || 0)
        })).sort((a,b) => b.score - a.score);
    } catch(e) { console.error("LB fetch:", e); return []; }
}

async function saveScore(name, sc) {
    try {
        const key = name.toLowerCase().replace(/[^a-z0-9]/g, '_');
        const getRes = await fetch(`${FB_BASE}/leaderboard/${key}`);
        if (getRes.ok) {
            const existing = await getRes.json();
            const oldScore = parseInt(existing.fields?.score?.integerValue || 0);
            if (oldScore >= sc) return;
        }
        const url = `${FB_BASE}/leaderboard/${key}?updateMask.fieldPaths=name&updateMask.fieldPaths=score&updateMask.fieldPaths=updatedAt`;
        await fetch(url, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                fields: {
                    name:      { stringValue: name },
                    score:     { integerValue: sc },
                    updatedAt: { integerValue: Date.now() }
                }
            })
        });
    } catch(e) { console.error("Save score:", e); }
}

function renderLeaderboard(elId, lb, highlightName) {
    const el = document.getElementById(elId);
    if (!lb || lb.length === 0) {
        el.innerHTML = '<h2>🏆 Top Players</h2><div class="lb-empty">No scores yet — be the first!</div>';
        return;
    }
    const medals = ['🥇','🥈','🥉'];
    let html = '<h2>🏆 Top Players</h2>';
    lb.forEach((entry, i) => {
        const isMe = highlightName && entry.name.toLowerCase() === highlightName.toLowerCase();
        html += `<div class="lb-row" style="${isMe ? 'background:rgba(255,223,0,0.18);border-radius:6px;' : ''}">
            <span class="lb-rank">${medals[i] || (i+1)+'.'}</span>
            <span class="lb-name">${entry.name}</span>
            <span class="lb-score">${entry.score}</span>
        </div>`;
    });
    el.innerHTML = html;
}

// ── Canvas / scale ────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const VW = 420, VH = 700;
let scale = 1, offsetX = 0, offsetY = 0;

function resize() {
    scale   = Math.min(window.innerWidth / VW, window.innerHeight / VH);
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    offsetX = (window.innerWidth  - VW * scale) / 2;
    offsetY = (window.innerHeight - VH * scale) / 2;
    ctx.setTransform(scale, 0, 0, scale, offsetX, offsetY);
}
resize();
window.addEventListener('resize', resize);

// ── Config ────────────────────────────────────────────────────────────────────
const PIPE_W   = 70;
const GAP      = 260;
const PIPE_SPD = 2.3;
const GRAVITY  = 0.5;
const JUMP_V   = -7.0;
const PL_X     = 100;
const PL_W     = 70, PL_H = 60;
const GROUND_H = 30;

// ── State ─────────────────────────────────────────────────────────────────────
let gameStarted = false, gameOver = false;
let score = 0, frameCount = 0;
let gameOverTime = 0, raf = null, restartOk = false;
let py = VH / 2, vy = 0;
let pipes = [], passedPipes = [];
let playerName = 'Player';
let localBest  = 0;
let lastTime = 0, elapsed = 0;

const startScreen    = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScoreEl   = document.getElementById('finalScore');
const nameInputEl    = document.getElementById('nameInput');

// ── Images ────────────────────────────────────────────────────────────────────
const faceImg   = new Image(); faceImg.src   = 'face.png';
const trophyImg = new Image(); trophyImg.src = 'trophy.png';

// ── Audio ─────────────────────────────────────────────────────────────────────
let jumpAudio, gameOverAudio, bgMusic, audioReady = false;
function loadAudio() {
    try {
        jumpAudio     = new Audio('ek_chakke_ne_world_cup.mp3'); jumpAudio.volume = 1.0;
        gameOverAudio = new Audio('ek_chakke_ne_world_cup.mp3'); gameOverAudio.volume = 0.8;
        bgMusic       = new Audio('Bole Jo Koyal Bago Mein Tik Tok - 64Kbps-(Mr-Jat.in).mp3');
        bgMusic.volume = 0.3; bgMusic.loop = true;
        jumpAudio.addEventListener('canplaythrough', () => audioReady = true);
    } catch(e) {}
}
function playJump() {
    if (!audioReady || !jumpAudio) return;
    const s = jumpAudio.cloneNode(); s.volume = 1.0;
    s.play().catch(()=>{}); setTimeout(()=>s.pause(), 400);
}
function playGameOver() {
    if (!audioReady || !gameOverAudio) return;
    gameOverAudio.currentTime = 0; gameOverAudio.play().catch(()=>{});
}
function playBg() {
    if (!bgMusic) return;
    bgMusic.currentTime = 102;
    bgMusic.play().catch(()=>{});
    setInterval(()=>{ if (bgMusic.currentTime >= 130) bgMusic.currentTime = 102; }, 1000);
}
function stopBg() { bgMusic && bgMusic.pause(); }

// ── Pipes ─────────────────────────────────────────────────────────────────────
function spawnPipe() {
    const gap_y   = Math.random() * (VH - 400) + 130;
    const stagger = Math.random() < 0.5 ? Math.random() * 80 + 40 : 0;
    pipes.push({ x: VW, gap_y, stagger });
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawBg() {
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#ffdf00';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
    ctx.fillStyle = '#ffdf00'; ctx.fillRect(0, 0, VW, VH);
    ctx.fillStyle = '#008000'; ctx.fillRect(0, VH - GROUND_H, VW, GROUND_H);
    ctx.fillStyle = '#006400'; ctx.fillRect(0, VH - GROUND_H, VW, 4);
}

function drawPipes() {
    for (const p of pipes) {
        const { x, gap_y, stagger } = p;
        const topX = x, botX = x + (stagger || 0);
        const botY = gap_y + GAP, botH = VH - GROUND_H - botY;
        ctx.fillStyle = '#008000'; ctx.strokeStyle = '#006400'; ctx.lineWidth = 3;
        ctx.fillRect(topX, 0, PIPE_W, gap_y);
        ctx.strokeRect(topX, 0, PIPE_W, gap_y);
        if (gap_y > 40 && trophyImg.complete && trophyImg.naturalWidth > 0)
            ctx.drawImage(trophyImg, topX, gap_y - 70, 70, 70);
        ctx.fillRect(botX, botY, PIPE_W, botH);
        ctx.strokeRect(botX, botY, PIPE_W, botH);
        if (botH > 40 && trophyImg.complete && trophyImg.naturalWidth > 0)
            ctx.drawImage(trophyImg, botX, botY, 70, 70);
    }
}

function drawPlayer() {
    if (faceImg.complete && faceImg.naturalWidth > 0) {
        ctx.drawImage(faceImg, PL_X, py, PL_W, PL_H);
    } else {
        ctx.fillStyle = '#ffe066'; ctx.fillRect(PL_X, py, PL_W, PL_H);
        ctx.fillStyle = '#222'; ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('MSD', PL_X + PL_W/2, py + PL_H/2);
    }
}

function drawScore() {
    ctx.fillStyle = '#000'; ctx.font = 'bold 50px Arial';
    ctx.textAlign = 'center'; ctx.fillText(score.toString(), VW / 2, 55);
}

// ── Collision ─────────────────────────────────────────────────────────────────
function checkCollision() {
    const pad = 6;
    const x1 = PL_X+pad, y1 = py+pad, x2 = PL_X+PL_W-pad, y2 = py+PL_H-pad;
    if (y1 < 0 || y2 > VH - GROUND_H) return true;
    for (const p of pipes) {
        if (x2 > p.x && x1 < p.x + PIPE_W && y1 < p.gap_y) return true;
        const botX = p.x + (p.stagger||0), botY = p.gap_y + GAP;
        if (x2 > botX && x1 < botX + PIPE_W && y2 > botY) return true;
    }
    return false;
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function gameLoop(timestamp) {
    if (!gameStarted || gameOver) return;

    const dt = Math.min((timestamp - lastTime) / 16.67, 2.5);
    lastTime = timestamp;
    elapsed += dt * 16.67;

    const gMult = elapsed < 1500 ? 0.3 : 1.0;
    vy += GRAVITY * gMult * dt;
    py += vy * dt;

    if (frameCount === 30) spawnPipe();
    else if (frameCount > 30 && (frameCount - 30) % 90 === 0) spawnPipe();

    for (const p of pipes) p.x -= PIPE_SPD * dt;
    pipes = pipes.filter(p => p.x + PIPE_W > -10);

    drawBg(); drawPipes(); drawPlayer(); drawScore();

    for (const p of pipes) {
        if (p.x + PIPE_W < PL_X && !passedPipes.includes(p)) {
            score += 2; passedPipes.push(p);
        }
    }

    if (checkCollision()) {
        gameOver = true; stopBg(); playGameOver();
        handleGameOver();
        return;
    }
    frameCount++;
    raf = requestAnimationFrame(gameLoop);
}

async function handleGameOver() {
    if (score > localBest) localBest = score;
    finalScoreEl.textContent = `Score: ${score}  |  Best: ${localBest}`;
    document.getElementById('displayName').textContent = `👤 ${playerName}`;
    gameOverScreen.classList.remove('hidden');
    gameOverTime = Date.now();
    restartOk = false;

    const btn = document.getElementById('restartBtn');
    const lbl = document.getElementById('restartLabel');
    btn.disabled = true; btn.style.opacity = '0.5'; btn.style.cursor = 'not-allowed';
    let secs = 2;
    lbl.textContent = `⏳ ${secs}s`;
    const iv = setInterval(() => {
        secs--;
        if (secs > 0) {
            lbl.textContent = `⏳ ${secs}s`;
        } else {
            clearInterval(iv);
            restartOk = true;
            btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer';
            lbl.textContent = '▶ Play Again';
        }
    }, 1000);

    await saveScore(playerName, score);
    const lb = await getLeaderboard();
    renderLeaderboard('gameOverLeaderboard', lb, playerName);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function jump() { if (gameStarted && !gameOver) { vy = JUMP_V; playJump(); } }

function handleTap(e) {
    if (e.target && ['INPUT','BUTTON'].includes(e.target.tagName)) return;
    if (gameStarted && !gameOver) jump();
    else if (gameOver && restartOk) restartGame();
}

function doStart() {
    const n = nameInputEl.value.trim();
    playerName = n.length > 0 ? n : 'Player_' + Math.floor(1000 + Math.random() * 9000);
    startGame();
}

function startGame() {
    gameStarted = true; gameOver = false;
    score = 0; frameCount = 0;
    py = VH / 2; vy = 0;
    pipes = []; passedPipes = [];
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    playBg();
    if (raf) cancelAnimationFrame(raf);
    lastTime = 0; elapsed = 0;
    raf = requestAnimationFrame(gameLoop);
}

function restartGame() { startGame(); }

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('startBtn').addEventListener('click',    e => { e.stopPropagation(); doStart(); });
document.getElementById('restartBtn').addEventListener('click',  e => { e.stopPropagation(); restartGame(); });
document.getElementById('editNameBtn').addEventListener('click', e => {
    e.stopPropagation();
    const editRow = document.getElementById('nameEditRow');
    const dispRow = document.getElementById('nameDisplay');
    document.getElementById('editNameInput').value = playerName;
    editRow.style.display = 'flex';
    dispRow.style.display = 'none';
    document.getElementById('editNameInput').focus();
});
document.getElementById('saveNameBtn').addEventListener('click', e => {
    e.stopPropagation();
    const val = document.getElementById('editNameInput').value.trim();
    if (val.length > 0) playerName = val.slice(0, 16);
    document.getElementById('displayName').textContent = `👤 ${playerName}`;
    document.getElementById('nameEditRow').style.display = 'none';
    document.getElementById('nameDisplay').style.display = 'flex';
});

canvas.addEventListener('click', handleTap);
document.addEventListener('touchstart', e => {
    if (gameStarted && !gameOver) { e.preventDefault(); handleTap(e); }
}, { passive: false });
startScreen.addEventListener('touchstart', e => {
    if (e.target.tagName !== 'BUTTON') e.preventDefault();
});
document.addEventListener('touchmove', e => { if (gameStarted) e.preventDefault(); }, { passive: false });
document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); handleTap(e); }
    if (e.code === 'KeyR' && gameOver) restartGame();
});
nameInputEl.addEventListener('keydown', e => { if (e.code === 'Enter') doStart(); });

// ── Boot ──────────────────────────────────────────────────────────────────────
loadAudio();
(function idleDraw() { if (!gameStarted) { drawBg(); requestAnimationFrame(idleDraw); } })();
getLeaderboard().then(lb => renderLeaderboard('startLeaderboard', lb, null));
console.log('🏏 Flappy Dhoni — ready!');
</script>
</body>
</html>
