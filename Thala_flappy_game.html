<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Dhoni</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #ffdf00;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            touch-action: none;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            max-width: 100vw;
            max-height: 100vh;
        }
        .start-screen, .game-over-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            z-index: 10;
        }
        .start-screen h1, .game-over-screen h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .start-screen p, .game-over-screen p { font-size: 1.2em; margin: 10px 0; }
        .btn {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:hover { background: #45a049; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .hidden { display: none !important; }
        @media (max-width: 768px) {
            .start-screen h1, .game-over-screen h1 { font-size: 2em; }
            .btn { padding: 12px 25px; font-size: 1.1em; }
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- START SCREEN — original -->
<div class="start-screen" id="startScreen">
    <h1>🏏 Flappy Dhoni</h1>
    <img src="start.png" alt="Start" style="width:200px;height:150px;margin:20px;border:2px solid #000;border-radius:10px;">
    <p>Tap to Start Playing!</p>
    <div style="color:#fff;font-size:0.9em;margin:10px 0;">Tap anywhere to jump</div>
</div>

<!-- GAME OVER SCREEN — original -->
<div class="game-over-screen hidden" id="gameOverScreen">
    <img src="image.png" alt="Game Over" style="width:300px;height:200px;margin:20px;border:2px solid #000;border-radius:10px;">
    <h1>GAME OVER!</h1>
    <p id="finalScore">Score: 0</p>
    <button class="btn" id="restartBtn">Tap to Restart</button>
    <div style="color:#fff;font-size:0.9em;">Tap anywhere to restart</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen    = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScoreEl   = document.getElementById('finalScore');

// ── Canvas / scale ────────────────────────────────────────────────────────────
const VW = 420, VH = 700;
let scale = 1;
function resize() {
    scale = Math.min(window.innerWidth / VW, window.innerHeight / VH);
    canvas.width  = Math.round(VW * scale);
    canvas.height = Math.round(VH * scale);
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── Config ────────────────────────────────────────────────────────────────────
const PIPE_W   = 70;
const GAP      = 260;   // vertical gap between top & bottom pipe
const PIPE_SPD = 2.3;
const GRAVITY  = 0.5;
const JUMP_V   = -7.0;
const PL_X     = 100;
const PL_W     = 70, PL_H = 60;
const GROUND_H = 30;

// ── State ─────────────────────────────────────────────────────────────────────
let gameStarted = false, gameOver = false;
let score = 0, highScore = 0, frameCount = 0;
let gameOverTime = 0, raf = null;
let py = VH / 2, vy = 0;
let pipes = [], passedPipes = [];

// ── Images ────────────────────────────────────────────────────────────────────
const faceImg   = new Image(); faceImg.src   = 'face.png';
const trophyImg = new Image(); trophyImg.src = 'trophy.png';

// ── Audio ─────────────────────────────────────────────────────────────────────
let jumpAudio, gameOverAudio, bgMusic, audioReady = false;
function loadAudio() {
    try {
        jumpAudio    = new Audio('ek_chakke_ne_world_cup.mp3');    jumpAudio.volume = 1.0;
        gameOverAudio= new Audio('ek_chakke_ne_world_cup.mp3');    gameOverAudio.volume = 0.8;
        bgMusic      = new Audio('Bole Jo Koyal Bago Mein Tik Tok - 64Kbps-(Mr-Jat.in).mp3');
        bgMusic.volume = 0.3; bgMusic.loop = true;
        jumpAudio.addEventListener('canplaythrough', () => audioReady = true);
    } catch(e) {}
}
function playJump() {
    if (!audioReady || !jumpAudio) return;
    const s = jumpAudio.cloneNode(); s.volume = 1.0;
    s.play().catch(()=>{}); setTimeout(()=>s.pause(), 400);
}
function playGameOver() {
    if (!audioReady || !gameOverAudio) return;
    gameOverAudio.currentTime = 0; gameOverAudio.play().catch(()=>{});
}
function playBg() {
    if (!bgMusic) return;
    bgMusic.currentTime = 102;
    bgMusic.play().catch(()=>{});
    setInterval(()=>{ if (bgMusic.currentTime >= 130) bgMusic.currentTime = 102; }, 1000);
}
function stopBg() { bgMusic && bgMusic.pause(); }

// ── Pipe spawn — exact original logic ────────────────────────────────────────
// gap_y = where the opening starts; top pipe = 0→gap_y, bottom = gap_y+GAP→bottom
function spawnPipe() {
    const gap_y = Math.random() * (VH - 400) + 130;
    // 50% chance: stagger top & bottom pipe on X axis by 40–120px
    const stagger = Math.random() < 0.5 ? Math.random() * 80 + 40 : 0;
    pipes.push({ x: VW, gap_y, stagger });
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function drawBg() {
    ctx.fillStyle = '#ffdf00';
    ctx.fillRect(0, 0, VW, VH);
    ctx.fillStyle = '#008000';
    ctx.fillRect(0, VH - GROUND_H, VW, GROUND_H);
    ctx.fillStyle = '#006400';
    ctx.fillRect(0, VH - GROUND_H, VW, 4);
}

function drawPipes() {
    for (const p of pipes) {
        const { x, gap_y, stagger } = p;
        const topX = x;
        const botX = x + (stagger || 0);
        const botY = gap_y + GAP;
        const botH = VH - GROUND_H - botY;

        ctx.fillStyle   = '#008000';
        ctx.strokeStyle = '#006400';
        ctx.lineWidth   = 3;

        // Top pipe
        ctx.fillRect(topX, 0, PIPE_W, gap_y);
        ctx.strokeRect(topX, 0, PIPE_W, gap_y);
        if (gap_y > 40 && trophyImg.complete && trophyImg.naturalWidth > 0)
            ctx.drawImage(trophyImg, topX, gap_y - 70, 70, 70);

        // Bottom pipe (staggered)
        ctx.fillRect(botX, botY, PIPE_W, botH);
        ctx.strokeRect(botX, botY, PIPE_W, botH);
        if (botH > 40 && trophyImg.complete && trophyImg.naturalWidth > 0)
            ctx.drawImage(trophyImg, botX, botY, 70, 70);
    }
}

function drawPlayer() {
    if (faceImg.complete && faceImg.naturalWidth > 0) {
        ctx.drawImage(faceImg, PL_X, py, PL_W, PL_H);
    } else {
        ctx.fillStyle = '#ffe066';
        ctx.fillRect(PL_X, py, PL_W, PL_H);
        ctx.fillStyle = '#222'; ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('MSD', PL_X + PL_W/2, py + PL_H/2);
    }
}

function drawScore() {
    ctx.fillStyle = '#000';
    ctx.font = 'bold 50px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(score.toString(), VW / 2, 55);
}

// ── Collision ─────────────────────────────────────────────────────────────────
function checkCollision() {
    const pad = 6;
    const x1 = PL_X + pad, y1 = py + pad;
    const x2 = PL_X + PL_W - pad, y2 = py + PL_H - pad;
    if (y1 < 0 || y2 > VH - GROUND_H) return true;
    for (const p of pipes) {
    if (x2 > p.x && x1 < p.x + PIPE_W && y1 < p.gap_y) return true; // top pipe
        const botX = p.x + (p.stagger || 0);
        const botY = p.gap_y + GAP;
        if (x2 > botX && x1 < botX + PIPE_W && y2 > botY) return true; // bottom pipe
    }
    return false;
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function gameLoop() {
    if (!gameStarted || gameOver) return;

    // Gravity — slow for first 2 sec
    const gMult = frameCount < 120 ? 0.3 : 1.0;
    vy += GRAVITY * gMult;
    py += vy;

    // Spawn pipes
    if (frameCount === 30) spawnPipe();
    else if (frameCount > 30 && (frameCount - 30) % 90 === 0) spawnPipe();

    // Move pipes
    for (const p of pipes) p.x -= PIPE_SPD;
    pipes = pipes.filter(p => p.x + PIPE_W > -10);

    // Draw
    drawBg();
    drawPipes();
    drawPlayer();
    drawScore();

    // Score
    for (const p of pipes) {
        if (p.x + PIPE_W < PL_X && !passedPipes.includes(p)) {
            score += 2;
            passedPipes.push(p);
        }
    }

    // Collision
    if (checkCollision()) {
        gameOver = true;
        stopBg(); playGameOver();
        finalScoreEl.textContent = `Score: ${score}`;
        gameOverScreen.classList.remove('hidden');
        gameOverTime = Date.now();
        return;
    }

    frameCount++;
    raf = requestAnimationFrame(gameLoop);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function jump() {
    if (gameStarted && !gameOver) { vy = JUMP_V; playJump(); }
}

function handleTap(e) {
    const touchY = e.touches ? e.touches[0].clientY : e.clientY;
    const isBottom = touchY > window.innerHeight / 2;

    if (!gameStarted && !gameOver) {
        startGame();
    } else if (gameStarted && !gameOver) {
        jump();
    } else if (gameOver) {
        if (Date.now() - gameOverTime >= 2000 || isBottom) restartGame();
    }
}

function startGame() {
    gameStarted = true; gameOver = false;
    score = 0; frameCount = 0;
    py = VH / 2; vy = 0;
    pipes = []; passedPipes = [];
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    playBg();
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(gameLoop);
}

function restartGame() { startGame(); }

canvas.addEventListener('click', handleTap);
canvas.addEventListener('touchstart', e => { if (gameStarted) { e.preventDefault(); handleTap(e); } }, { passive: false });
startScreen.addEventListener('touchstart', e => {
    if (['IMG','P','H1','DIV'].includes(e.target.tagName)) { e.preventDefault(); handleTap(e); }
});
document.getElementById('restartBtn').addEventListener('click', e => { e.stopPropagation(); restartGame(); });
document.addEventListener('touchmove', e => { if (gameStarted) e.preventDefault(); }, { passive: false });
document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); handleTap(e); }
    if (e.code === 'KeyR' && gameOver) restartGame();
});

loadAudio();
// Draw idle background while on start screen
(function idleDraw() { if (!gameStarted) { drawBg(); requestAnimationFrame(idleDraw); } })();
console.log('🏏 Flappy Dhoni — ready!');
</script>
</body>
</html>
